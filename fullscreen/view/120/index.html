<!-- Tablet Simulator - Property 120 -->
<!-- Simula o tabletsimplerhost.site/fullscreen/view/{id}/ -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>16213 Saint Martin Street - Guest Page</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; }

  /* ── Header ── */
  .tablet-header {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tablet-header h1 { font-size: 1.4rem; color: #1a1a2e; }
  .tablet-header .tablet-title { font-size: 1.4rem; font-weight: 700; color: #0d6efd; }
  .tablet-header .header-icons { display: flex; gap: 15px; align-items: center; color: #555; }
  .tablet-header .header-icons i { font-size: 1.2rem; }

  /* ── Main content ── */
  .main-content {
    max-width: 800px;
    margin: 30px auto;
    padding: 0 20px;
  }
  .property-card {
    background: #fff;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    text-align: center;
  }
  .property-card h2 { font-size: 1.8rem; color: #1a1a2e; margin-bottom: 10px; }
  .property-card .address { font-size: 1.1rem; color: #666; margin-bottom: 20px; }
  .property-card .badge {
    display: inline-block;
    background: #e8f4fd;
    color: #0d6efd;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 25px;
  }
  .store-link-card {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #0d6efd;
    color: #fff;
    text-decoration: none;
    padding: 14px 32px;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    transition: background 0.2s, transform 0.2s;
    margin-bottom: 15px;
  }
  .store-link-card:hover { background: #0b5ed7; transform: translateY(-2px); }
  .store-link-card i { font-size: 1.3rem; }
  .store-link-card[target="_blank"]::after { content: ' ⇗'; font-size: 0.9rem; }

  .m-see-all {
    display: inline-block;
    color: #0d6efd;
    text-decoration: none;
    font-weight: 600;
    padding: 10px 24px;
    border: 2px solid #0d6efd;
    border-radius: 10px;
    transition: all 0.2s;
    margin-left: 10px;
  }
  .m-see-all:hover { background: #0d6efd; color: #fff; }

  .info-text {
    margin-top: 30px;
    padding: 15px;
    background: #fffbe6;
    border-radius: 10px;
    font-size: 0.85rem;
    color: #856404;
    border: 1px solid #ffeeba;
  }
  .info-text strong { display: block; margin-bottom: 5px; }
</style>
</head>
<body>

<!-- Tablet Header -->
<header class="tablet-header">
  <h1><span class="tablet-title">16213 Saint Martin Street</span></h1>
  <div class="header-icons">
    <i class="bi bi-clock"></i>
    <span>10:30 AM</span>
    <i class="bi bi-globe2"></i>
    <span>EN</span>
  </div>
</header>

<!-- Main content -->
<div class="main-content">
  <div class="property-card">
    <div class="badge">Property #120</div>
    <h2>16213 Saint Martin Street</h2>
    <p class="address">Orlando, FL 32828</p>

    <div style="margin-top:25px;">
      <a href="https://shop.3dstudioorlando.com/" target="_blank" rel="noopener noreferrer" class="store-link-card">
        <i class="bi bi-shop"></i> Visit Store
      </a>
      <a href="https://shop.3dstudioorlando.com/" class="m-see-all">See All</a>
    </div>

    <div class="info-text">
      <strong>⚡ Simulator Mode</strong>
      This page simulates the tablet system. The Home button in the Shopify store will return here.
    </div>
  </div>
</div>

<script>
/* ── TABLET-SIDE: salva dados da propriedade no localStorage ── */
(function() {
  var PID_KEY = 'tso_property_id';
  var URL_KEY = 'tso_property_base_url';
  var TITLE_KEY = 'tso_property_title';
  var SHOPIFY_URL = 'https://shop.3dstudioorlando.com';

  // Extrai propertyId do path: /fullscreen/view/120/ → 120
  var pathMatch = window.location.pathname.match(/\/fullscreen\/view\/(\d+)/);
  var pid = pathMatch ? pathMatch[1] : null;

  if (pid) {
    // Salva ID
    localStorage.setItem(PID_KEY, pid);

    // Salva base URL do tablet (funciona c/ path prefix ex: /tablet-simulator/)
    var baseUrl = window.location.href.replace(/\/?\d+\/?$/, '') + '/';
    localStorage.setItem(URL_KEY, baseUrl);

    // Salva título da propriedade
    var titleEl = document.querySelector('.tablet-title');
    if (titleEl) localStorage.setItem(TITLE_KEY, titleEl.textContent.trim());

    // Intercepta cliques em links para a loja
    document.addEventListener('click', function(e) {
      var link = e.target.closest('a');
      if (link && link.href && link.href.indexOf(SHOPIFY_URL) === 0) {
        localStorage.setItem(PID_KEY, pid);
        localStorage.setItem(URL_KEY, baseUrl);
        if (titleEl) localStorage.setItem(TITLE_KEY, titleEl.textContent.trim());
      }
    }, true);
  }
})();
</script>

</body>
</html>
